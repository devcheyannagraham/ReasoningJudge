thinking_task:
  description: >
    Answer the user's question by thinking step by step:{question}
  expected_output: >
    Your answer to the question, along with a explanation of your thought process and reasoning steps that led you to the answer.
  agent: deep_thinker
  output_file: deep_thoughts.md

judging_task:
  description: >
    Given a question and a models response to the question, evaluate the response and determine if the answer is correct and if the response contains a logical thought process. The response is valid if it contains the correct answer and shows evidence of a logical thought process. If the answer is incorrect, DO NOT provide the correct answer. The answer can be incorrect and still show a logical thought process. {question}.
  expected_output: >
    A simple statement of whether the answer is correct or not, and if the response shows evidence of a logical thought process. 
    example responses:
    the answer is correct and shows a logical thought process.
    the answer is incorrect but shows a logical thought process.
    the answer is correct but does not show a logical thought process.
    the answer is incorrect and does not show a logical thought process.

  agent: judge
  output_file: judge_feedback.md
  context:
    - thinking_task

improve_task:
  description: >
    Based on the feedback provided by the judge, improve the thought process and answer for the question: {question}.
  expected_output: >
    An improved version of the answer for {question} that shows thinking steps.
  agent: deep_thinker
  output_file: improved_thoughts.md
  context:
    - judging_task
    - thinking_task

final_review:
  description: >
    Determine if the improved response answers the question correctly and if the thought process is logical and satisfactory. {question}.
  expected_output: >
    A simple statement of whether the improved answer is correct or not, and whether the model actually improved its reasoning. A brief explanation of the reasoning behind your evaluation.
  agent: judge
  output_file: final_review.md
  context:
    - improve_task
    - thinking_task
